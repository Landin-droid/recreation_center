version: '3.8'

services:
  # Бэкенд-сервер на Node.js (Express + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pobeda_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Обратите внимание, здесь мы ссылаемся на имя сервиса postgres "db" в docker-сети
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN_DAYS=7
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_API_KEY=${YOOKASSA_API_KEY}
      - PAYMENT_SUCCESS_REDIRECT=${PAYMENT_SUCCESS_REDIRECT}
      - PAYMENT_FAILURE_REDIRECT=${PAYMENT_FAILURE_REDIRECT}
      - PAYMENT_TIMEOUT_MINUTES=15
    depends_on:
      db:
        condition: service_healthy

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: pobeda_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local