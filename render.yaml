services:
  # Настройка базы данных PostgreSQL
  - type: postgres
    name: pobeda-db
    plan: free # Бесплатный тариф (база удалится через 90 дней, если не обновить)
    region: frankfurt # Ближайший к РФ бесплатный регион

  # Настройка бэкенда на Node.js
  - type: web
    name: pobeda-backend
    env: node
    plan: free # Бесплатный тариф (засыпает при неактивности)
    region: frankfurt
    rootDir: backend # Указываем папку, где лежит package.json
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: pobeda-db
          property: connectionString # Автоматически подтягиваем URL от базы данных
      - key: JWT_SECRET
        generateValue: true # Render сам сгенерирует безопасный ключ
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN_DAYS
        value: 7
      - key: YOOKASSA_SHOP_ID
        sync: false # Нужно будет заполнить вручную в панели Render
      - key: YOOKASSA_API_KEY
        sync: false # Нужно будет заполнить вручную в панели Render
      - key: PAYMENT_SUCCESS_REDIRECT
        sync: false # Нужно будет заполнить вручную в панели Render
      - key: PAYMENT_FAILURE_REDIRECT
        sync: false # Нужно будет заполнить вручную в панели Render
      - key: PAYMENT_TIMEOUT_MINUTES
        value: 15